<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="mogaworld">
  <title>mogaworld</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ec4b6"/>
      <stop offset="100%" style="stop-color:#1a8a7a"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
  <!-- Globe outline -->
  <circle cx="50" cy="38" r="22" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- Vertical center line -->
  <line x1="50" y1="16" x2="50" y2="60" stroke="white" stroke-width="1.8"/>
  <!-- Horizontal equator line -->
  <line x1="28" y1="38" x2="72" y2="38" stroke="white" stroke-width="1.8"/>
  <!-- Upper latitude arc -->
  <path d="M 31 27 Q 50 22 69 27" fill="none" stroke="white" stroke-width="1.8"/>
  <!-- Lower latitude arc -->
  <path d="M 31 49 Q 50 54 69 49" fill="none" stroke="white" stroke-width="1.8"/>
  <!-- "M" letter below globe -->
  <text x="50" y="84" font-family="Arial,sans-serif" font-weight="900" font-size="26" fill="white" text-anchor="middle" dominant-baseline="auto" letter-spacing="-1">M</text>
</svg>
